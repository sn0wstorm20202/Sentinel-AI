name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate:
    name: Validation
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Backend Dependencies
      run: pip install -r requirements.txt

    - name: Setup Node
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Setup pnpm
      run: npm install -g pnpm && pnpm config set store-dir ~/.pnpm-store

    - name: Install Frontend Dependencies
      working-directory: ./frontend
      run: pnpm install --frozen-lockfile

    - name: Backend Tests & Lint
      run: |
        echo "Running backend validation..."
        # python -m pytest tests/
        python scripts/validate_logic.py || true

    - name: Frontend Lint
      working-directory: ./frontend
      run: pnpm lint

    - name: Frontend TypeScript
      working-directory: ./frontend
      run: pnpm exec tsc --noEmit

    - name: Frontend Build
      working-directory: ./frontend
      run: pnpm run build

  docker-build:
    name: Docker Build
    needs: validate
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v3

    - name: Build Backend Image
      run: docker build -t sentinel-ai-backend:latest .

    - name: Build Frontend Image
      run: docker build -t sentinel-ai-frontend:latest ./frontend

    # In a real setup, we would push to ECR/GCR/DockerHub here.
