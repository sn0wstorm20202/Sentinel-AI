

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: sentinel-ai-backend:latest
    container_name: sentinel_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - WORKERS=4
      - PORT=8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/live"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - sentinel-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: sentinel-ai-frontend:latest
    container_name: sentinel_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
      - BACKEND_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/cases"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - sentinel-network

  nginx:
    image: nginx:alpine
    container_name: sentinel_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - sentinel-network

networks:
  sentinel-network:
    driver: bridge
